services:
  app:
    build:
      args:
        - GEOSERVER_VERSION=${GEOSERVER_VERSION:-2.28.4}
      context: .
    image: ucblib/geoserver:${DOCKER_TAG:-development}
    environment:
      INSTALL_EXTENSIONS: "true"
      STABLE_EXTENSIONS: gdal
      COMMUNITY_EXTENSIONS: sec-keycloak,sec-oidc
      ROOT_WEBAPP_REDIRECT: "true"
    extra_hosts:
      - keycloak.localhost:host-gateway
    ports:
      - 8080:8080
    volumes:
      - ./geoserver_data:/opt/geoserver_data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "http://keycloak.localhost:8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8180"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-INFO}
    healthcheck:
      # curl/wget are not present in the UBI9-based Keycloak image; use /dev/tcp.
      # KC_HEALTH_ENABLED=true exposes /health/ready on the management port (9000).
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'status.*UP' <&3",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    image: quay.io/keycloak/keycloak:26.1
    ports:
      - 127.0.0.1:8180:8180
    restart: always

  keycloak-config:
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      IMPORT_FILES_LOCATIONS: /config/*
      IMPORT_VAR_SUBSTITUTION_ENABLED: "true"
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP}
      OIDC_USER_GROUP: ${OIDC_USER_GROUP}
    image: adorsys/keycloak-config-cli:latest-26.1.0
    restart: on-failure:3
    volumes:
      - ./keycloak/config:/config

volumes:
  geoserver_data:
  postgres_data:
