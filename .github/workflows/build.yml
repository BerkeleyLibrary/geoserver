name: Build / Test / Push

on:
  push:
    branches:
      - "**"
  workflow_call:
  workflow_dispatch:

env:
  BUILD_SUFFIX: -build-${{ github.run_id }}_${{ github.run_attempt }}

jobs:
  docker-build:
    uses: BerkeleyLibrary/.github/.github/workflows/docker-build.yml@v2.0.0
    with:
      image: ghcr.io/${{ github.repository }}
    secrets: inherit

  test:
    runs-on: ubuntu-24.04
    needs:
      - docker-build
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      DOCKER_APP_IMAGE: ${{ needs.docker-build.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the stack
        run: docker compose up --detach --wait

      - name: Run the test script
        run: docker compose exec app run-tests

      - if: ${{ always() }}
        name: Retain logs and configs for debugging
        run: |
          mkdir artifacts
          docker compose logs > artifacts/docker-compose.log
          docker compose config > artifacts/docker-compose.yml
          curl -sL --cookie-jar .cookies http://localhost:8080/geoserver/web/ || true > artifacts/geoserver-web.html

      - if: ${{ always() }}
        name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: GeoServer Build (${{ env.BUILD_SUFFIX }})
          path: artifacts/*
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: false

  push:
    needs:
      - docker-build
      - test
    uses: BerkeleyLibrary/.github/.github/workflows/docker-push.yml@v2.0.0
    with:
      image: ghcr.io/${{ github.repository }}
      build-image-arm64: ${{ needs.docker-build.outputs.image-arm64 }}
      build-image-x64: ${{ needs.docker-build.outputs.image-x64 }}
    secrets: inherit
